<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MediFolio - Search Blood Group</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-gradient-to-br from-blue-50 to-indigo-50 min-h-screen">

    <!-- HEADER -->
    <header class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-indigo-600 p-2 rounded-lg">
                    <i class="fas fa-heartbeat text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">MediFolio</h1>
                    <p class="text-xs text-gray-500">Secure Medical Records</p>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <div class="max-w-5xl mx-auto p-6">
        <a href="/" class="inline-flex items-center space-x-2 mb-3 text-indigo-700 hover:text-indigo-900 font-medium">
            <i class="fas fa-arrow-left"></i>
            <span>Back to Dashboard</span>
        </a>


        <h2 class="text-3xl font-bold text-gray-800 mb-6">Search by Blood Group</h2>

        <!-- Search Bar -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
            <div class="flex flex-col md:flex-row space-y-4 md:space-y-0 md:space-x-4">
                <select id="bloodGroupSearch"
                    class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="">Select Blood Group</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                </select>
                <button onclick="searchByBloodGroup()"
                    class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition-colors">
                    <i class="fas fa-search mr-2"></i> Search
                </button>
            </div>
        </div>

        <!-- Results -->
        <div id="bloodGroupResults" class="space-y-4">
            <!-- Cards will be appended here -->
        </div>
    </div>


    <script>

        let patients = [];

        async function loadUsers() {
            const r = await fetch('/list_users');

            patients = await r.json();

        }

        window.onload = loadUsers;




        function searchByBloodGroup() {
            const selectedGroup = document.getElementById("bloodGroupSearch").value;
            const resultsDiv = document.getElementById("bloodGroupResults");
            resultsDiv.innerHTML = "";

            if (!selectedGroup) {
                resultsDiv.innerHTML = `<p class="text-gray-500">Please select a blood group to search.</p>`;
                return;
            }

            const filtered = patients.filter(p => p.blood_group === selectedGroup);

            if (filtered.length === 0) {
                resultsDiv.innerHTML = `<p class="text-red-500">No patients found with blood group ${selectedGroup}.</p>`;
                return;
            }

            filtered.forEach(patient => {
                const card = document.createElement("div");
                card.className = "bg-white p-6 rounded-xl shadow-md flex flex-col md:flex-row justify-between items-start md:items-center transition hover:shadow-lg";
                card.innerHTML = `
                    <div class="space-y-1">
                        <p><span class="font-medium">Name:</span> ${patient.full_name}</p>
                        <p><span class="font-medium">Blood Group:</span> ${patient.blood_group}</p>
                        <p><span class="font-medium">Contact:</span> ${patient.contact}</p>
                        <p><span class="font-medium">Address:</span> ${patient.address}</p>
                    </div>
                `;
                resultsDiv.appendChild(card);
            });
        }
    </script>

</body>

</html>
